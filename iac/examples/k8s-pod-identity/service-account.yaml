---
# Service account used by API pods.
# The IAM role is bound to this SA via aws_eks_pod_identity_association in Terraform.
# No annotation is required — Pod Identity injects credentials via the agent DaemonSet.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-service-account
  namespace: app
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/managed-by: terraform
