---
# Demo deployment: API pod accessing S3 via EKS Pod Identity.
#
# How Pod Identity works here:
#  1. Terraform creates an IAM role (devops-demo-dev-pod-api-s3) with
#     a trust policy allowing pods.eks.amazonaws.com.
#  2. Terraform creates an aws_eks_pod_identity_association linking:
#        namespace=app, serviceAccount=api-service-account → IAM role ARN
#  3. The eks-pod-identity-agent DaemonSet intercepts the AWS SDK credential
#     request from the pod and returns temporary STS credentials — no
#     annotations, no OIDC, no webhook needed.
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: app
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
    spec:
      # REQUIRED: Pod must use the service account linked via Pod Identity
      serviceAccountName: api-service-account

      containers:
        - name: api
          image: <ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/devops-demo-dev-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          env:
            - name: AWS_REGION
              value: us-east-1
            - name: S3_BUCKET
              value: "my-app-bucket"

          # AWS SDK automatically picks up Pod Identity credentials
          # from the agent running on the node — no extra env vars needed.

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20

      # Tolerate spot nodes if desired
      tolerations:
        - key: "spot"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"

      # Prefer to spread across AZs
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: api
