###############################################################################
# ExternalSecrets — pull values from AWS Secrets Manager into Kubernetes.
# SM secret names follow:  devops-demo-dev-<key>
# Apply AFTER the ClusterSecretStore (secret-store.yaml) and the ESO install.
###############################################################################
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jenkins-admin
  namespace: jenkins
spec:
  refreshInterval: 1h
  secretStoreRef: { name: aws-secretsmanager, kind: ClusterSecretStore }
  target: { name: jenkins-admin, creationPolicy: Owner }
  data:
    - secretKey: username
      remoteRef: { key: devops-demo-dev-jenkins-admin, property: username }
    - secretKey: password
      remoteRef: { key: devops-demo-dev-jenkins-admin, property: password }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef: { name: aws-secretsmanager, kind: ClusterSecretStore }
  target: { name: grafana-admin, creationPolicy: Owner }
  data:
    - secretKey: username
      remoteRef: { key: devops-demo-dev-grafana-admin, property: username }
    - secretKey: password
      remoteRef: { key: devops-demo-dev-grafana-admin, property: password }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sonarqube-db
  namespace: sonarqube
spec:
  refreshInterval: 1h
  secretStoreRef: { name: aws-secretsmanager, kind: ClusterSecretStore }
  target: { name: sonarqube-db, creationPolicy: Owner }
  data:
    - secretKey: username
      remoteRef: { key: devops-demo-dev-sonarqube-db, property: username }
    - secretKey: password
      remoteRef: { key: devops-demo-dev-sonarqube-db, property: password }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sonarqube-monitoring
  namespace: sonarqube
spec:
  refreshInterval: 1h
  secretStoreRef: { name: aws-secretsmanager, kind: ClusterSecretStore }
  target: { name: sonarqube-monitoring, creationPolicy: Owner }
  data:
    - secretKey: password
      remoteRef: { key: devops-demo-dev-sonarqube-monitoring, property: password }
---
# Git PAT — labelled so the Jenkins kubernetes-credentials-provider imports it
# as a username/password credential with id "git-credentials".
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: git-credentials
  namespace: jenkins
spec:
  refreshInterval: 1h
  secretStoreRef: { name: aws-secretsmanager, kind: ClusterSecretStore }
  target:
    name: git-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          jenkins.io/credentials-type: usernamePassword
        annotations:
          jenkins.io/credentials-description: "Git credentials (from Secrets Manager)"
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef: { key: devops-demo-dev-git-credentials, property: username }
    - secretKey: password
      remoteRef: { key: devops-demo-dev-git-credentials, property: password }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: registry-credentials
  namespace: jenkins
spec:
  refreshInterval: 1h
  secretStoreRef: { name: aws-secretsmanager, kind: ClusterSecretStore }
  target:
    name: registry-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          jenkins.io/credentials-type: usernamePassword
        annotations:
          jenkins.io/credentials-description: "Registry credentials (from Secrets Manager)"
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef: { key: devops-demo-dev-registry-credentials, property: username }
    - secretKey: password
      remoteRef: { key: devops-demo-dev-registry-credentials, property: password }
---
# SonarQube analysis token — labelled as a Jenkins "secret text" credential
# with id "sonarqube-token" (referenced by the JCasC pipeline config).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sonarqube-token
  namespace: jenkins
spec:
  refreshInterval: 1h
  secretStoreRef: { name: aws-secretsmanager, kind: ClusterSecretStore }
  target:
    name: sonarqube-token
    creationPolicy: Owner
    template:
      metadata:
        labels:
          jenkins.io/credentials-type: secretText
        annotations:
          jenkins.io/credentials-description: "SonarQube token (from Secrets Manager)"
      data:
        text: "{{ .text }}"
  data:
    - secretKey: text
      remoteRef: { key: devops-demo-dev-sonarqube-token, property: token }
---
# Aggregated secret consumed by Jenkins via JCasC env vars (controller.containerEnv
# in jenkins.values.yaml). Combines the GitHub + SonarQube values from Secrets
# Manager into one secret; JCasC defines the Jenkins credentials from these.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jenkins-platform-creds
  namespace: jenkins
spec:
  refreshInterval: 1h
  secretStoreRef: { name: aws-secretsmanager, kind: ClusterSecretStore }
  target:
    name: jenkins-platform-creds
    creationPolicy: Owner
  data:
    - secretKey: github-username
      remoteRef: { key: devops-demo-dev-git-credentials, property: username }
    - secretKey: github-token
      remoteRef: { key: devops-demo-dev-git-credentials, property: password }
    - secretKey: sonar-token
      remoteRef: { key: devops-demo-dev-sonarqube-token, property: token }
