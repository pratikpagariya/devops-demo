###############################################################################
# ClusterSecretStore — points External Secrets at AWS Secrets Manager.
# Auth uses the external-secrets controller's EKS Pod Identity credentials
# (role created in iac/stacks/dev/platform.tf), so no static keys and no
# serviceAccountRef are required here.
###############################################################################
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
