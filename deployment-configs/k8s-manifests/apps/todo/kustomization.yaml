###############################################################################
# Kustomize entrypoint for the Todo app (ArgoCD renders this with kustomize).
#
# The CI pipeline updates the image tags here with:
#   kustomize edit set image \
#     todo-backend=<ECR>/devops-demo-dev-todo-backend:<TAG> \
#     todo-frontend=<ECR>/devops-demo-dev-todo-frontend:<TAG>
# then commits — ArgoCD syncs the new tags to EKS.
###############################################################################
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: todo

resources:
  - namespace.yaml
  - backend.yaml
  - frontend.yaml
  - ingress.yaml

images:
  - name: todo-backend
    newName: 355653384401.dkr.ecr.us-east-1.amazonaws.com/devops-demo-dev-todo-backend
    newTag: f4e3308
  - name: todo-frontend
    newName: 355653384401.dkr.ecr.us-east-1.amazonaws.com/devops-demo-dev-todo-frontend
    newTag: f4e3308
