###############################################################################
# Default gp3 StorageClass backed by the EBS CSI driver (installed as an EKS
# addon by Terraform). setup-all.sh removes the default flag from the legacy
# gp2 class so this one is the single cluster default.
###############################################################################
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
reclaimPolicy: Delete
parameters:
  type: gp3
  encrypted: "true"
  fsType: ext4
