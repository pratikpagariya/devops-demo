###############################################################################
# metrics-server — powers `kubectl top` and HPA.
###############################################################################
args:
  - --kubelet-preferred-address-types=InternalIP
  - --kubelet-use-node-status-port
  - --metric-resolution=15s

replicas: 2

resources:
  requests:
    cpu: 50m
    memory: 100Mi
  limits:
    memory: 200Mi

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# AL2023 EKS-optimized AMIs ship valid kubelet serving certs, so TLS is verified.
# If you ever see "x509: cannot validate certificate", add:
#   - --kubelet-insecure-tls
