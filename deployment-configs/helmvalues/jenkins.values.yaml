###############################################################################
# Jenkins controller — CI engine.
# - Admin creds come from the `jenkins-admin` Kubernetes Secret (synced from
#   AWS Secrets Manager by External Secrets).
# - ECR push permission comes from EKS Pod Identity bound to the `jenkins` SA
#   (see eks_pod_identity_associations.jenkins-ecr in params/dev.tfvars).
# - Ingress is applied separately (k8s-manifests/ingress/jenkins-ingress.yaml).
###############################################################################
controller:
  # Pre-baked image from ECR — plugins are baked in at build time, so the pod
  # downloads NOTHING at startup (eliminates the boot-time 503 plugin failures).
  # ACCOUNT_ID is filled in by the setup step (sed) with your AWS account id.
  # Nodes can pull from ECR via their IAM role (AmazonEC2ContainerRegistryReadOnly).
  image:
    registry: "ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com"
    repository: "devops-demo-dev-jenkins"
    tag: "2.504.1"
  componentName: jenkins-controller
  replicas: 1

  admin:
    existingSecret: jenkins-admin
    userKey: username
    passwordKey: password

  # Secret VALUES from AWS Secrets Manager (synced to the `jenkins-platform-creds`
  # K8s secret by External Secrets). JCasC reads these as ${VAR} — so no token is
  # ever written into this file or the image.
  containerEnv:
    - name: GITHUB_USERNAME
      valueFrom:
        secretKeyRef:
          name: jenkins-platform-creds
          key: github-username
    - name: GITHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: jenkins-platform-creds
          key: github-token
    - name: SONAR_TOKEN
      valueFrom:
        secretKeyRef:
          name: jenkins-platform-creds
          key: sonar-token

  # Persisted JENKINS_HOME
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      memory: 2Gi

  serviceType: ClusterIP
  ingress:
    enabled: false

  # Plugins are baked into the custom ECR image at build time (see
  # deployment-configs/jenkins/Dockerfile + plugins.txt), so we install NONE at
  # boot. This is what removes the 503-on-startup failures for good.
  installPlugins: false

  additionalPlugins: []

  # Everything below is declarative (no UI clicking):
  #   - credentials (github + sonar) read from the env vars injected above
  #   - the SonarQube server
  #   - Job DSL script security OFF (so the seed job runs without manual approval)
  #   - the seed-job itself (it runs the Job DSL in the infra repo)
  JCasC:
    defaultConfig: true
    configScripts:
      platform: |
        credentials:
          system:
            domainCredentials:
              - credentials:
                  - usernamePassword:
                      scope: GLOBAL
                      id: "github-credentials"
                      description: "GitHub (from AWS Secrets Manager)"
                      username: "${GITHUB_USERNAME}"
                      password: "${GITHUB_TOKEN}"
                  - string:
                      scope: GLOBAL
                      id: "sonarqube-token"
                      description: "SonarQube token (from AWS Secrets Manager)"
                      secret: "${SONAR_TOKEN}"
        unclassified:
          sonarGlobalConfiguration:
            buildWrapperEnabled: true
            installations:
              - name: "sonarqube"
                serverUrl: "http://sonarqube-sonarqube.sonarqube.svc.cluster.local:9000"
                credentialsId: "sonarqube-token"
        security:
          globalJobDslSecurityConfiguration:
            useScriptSecurity: false
        jobs:
          - script: |
              pipelineJob('seed-job') {
                description('Generates the app pipeline jobs from Job DSL in the infra repo')
                definition {
                  cpsScm {
                    scm {
                      git {
                        remote {
                          url('https://github.com/pratikpagariya/devops-demo.git')
                          credentials('github-credentials')
                        }
                        branches('main')
                      }
                    }
                    scriptPath('deployment-configs/jenkins/Jenkinsfile.seed')
                  }
                }
              }

  sidecars:
    configAutoReload:
      enabled: true

serviceAccount:
  create: true
  name: jenkins      # Pod Identity (ECR push) binds to this SA

agent:
  enabled: true
  podName: jenkins-agent
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi
  # Run agents under the jenkins SA so Pod Identity ECR creds are available.
  serviceAccountName: jenkins

persistence:
  enabled: true
  storageClass: gp3
  size: 20Gi
