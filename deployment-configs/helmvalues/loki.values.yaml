###############################################################################
# Loki — log aggregation (SingleBinary mode, filesystem storage).
# Suitable for dev/demo. For prod, switch to S3 object storage + the
# SimpleScalable deployment mode.
###############################################################################
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  # schemaConfig is REQUIRED by Loki chart v6+
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  limits_config:
    retention_period: 168h          # 7 days
    ingestion_rate_mb: 10
    ingestion_burst_size_mb: 20

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: gp3
    size: 20Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

# Disable the scalable-mode components and external deps for SingleBinary.
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0
gateway:
  enabled: false
minio:
  enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# Disable bundled self-tests/canary to save resources.
test:
  enabled: false
lokiCanary:
  enabled: false
