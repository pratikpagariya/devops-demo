###############################################################################
# External Secrets Operator — syncs AWS Secrets Manager → Kubernetes Secrets.
# IAM via EKS Pod Identity (role created in iac/stacks/dev/platform.tf).
# The ClusterSecretStore is applied separately (k8s-manifests/secret-store.yaml).
###############################################################################
installCRDs: true

replicaCount: 1

serviceAccount:
  create: true
  name: external-secrets
  # Pod Identity supplies the secretsmanager:GetSecretValue permission.

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi

webhook:
  replicaCount: 1
  resources:
    requests:
      cpu: 25m
      memory: 64Mi

certController:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
